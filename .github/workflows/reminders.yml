name: Rappels automatiques EEAM Fès

on:
  schedule:
    # ⚠️ VERSION TEST : toutes les 10 minutes, pour pouvoir tester vite
    # (sorties collectives, push...) sans attendre dimanche ou le 1er du mois.
    # Pour la version OFFICIELLE, remettre : '0 7 * * *' (une fois par jour, 07:00 UTC).
    - cron: '*/10 * * * *'
  workflow_dispatch: {} # permet de lancer le test manuellement depuis l'onglet "Actions"

jobs:
  rappels:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        run: npm install firebase-admin web-push
        working-directory: automation

      - name: Envoyer les rappels si nécessaire
        working-directory: automation
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: node send-reminders.js
